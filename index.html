<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novel Project</title>
    <style>
        /* Base page styling to ensure full-height background */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #1a1a1a; /* Your background color */
            display: flex;
            flex-direction: column;
        }

        /* Container for the artwork */
        .art-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            width: 100%;
        }

        /* Ensures the image fits the screen fully without cropping */
        .art-container img {
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
        }

        /* Footer styling */
        footer {
            padding: 20px;
            text-align: center;
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

    <div class="art-container">
        <img src="path-to-your-image.jpg" alt="Novel Artwork">
    </div>

    <footer>
        <p>&copy; 2026 [Author Name] & Marcos. All rights reserved.</p>
    </footer>

</body>
</html>
